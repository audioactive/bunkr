<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bunkr Search</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #17171a;
      --surface2: #1f1f24;
      --border: #2a2a30;
      --accent: #6c63ff;
      --accent-hover: #8078ff;
      --text: #e8e8f0;
      --muted: #777787;
      --card-radius: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--accent);
      white-space: nowrap;
    }

    .search-wrap {
      flex: 1;
      display: flex;
      gap: 8px;
      max-width: 700px;
    }

    #q {
      flex: 1;
      padding: 10px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color .2s;
    }
    #q:focus { border-color: var(--accent); }

    select {
      padding: 10px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      cursor: pointer;
    }

    .add-btn {
      padding: 10px 16px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      transition: background .2s;
    }
    .add-btn:hover { background: var(--accent-hover); }

    main { max-width: 1300px; margin: 0 auto; padding: 24px; }

    .meta-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      font-size: 13px;
      color: var(--muted);
    }

    .stats-bar {
      display: flex;
      gap: 24px;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 20px;
      padding: 14px 20px;
      background: var(--surface);
      border-radius: 10px;
      border: 1px solid var(--border);
    }
    .stats-bar span b { color: var(--text); }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      transition: transform .15s, border-color .15s;
      display: flex;
      flex-direction: column;
    }
    .card:hover {
      transform: translateY(-3px);
      border-color: var(--accent);
    }

    .card-thumb {
      width: 100%;
      height: 140px;
      object-fit: cover;
      background: var(--surface2);
      display: block;
    }
    .thumb-placeholder {
      width: 100%;
      height: 140px;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      color: var(--border);
    }

    .card-body { padding: 12px; flex: 1; }
    .card-title {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 6px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-meta { font-size: 11px; color: var(--muted); display: flex; gap: 10px; }

    .badge {
      display: inline-block;
      padding: 2px 7px;
      background: var(--accent);
      color: #fff;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
    }

    .pagination {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 32px;
    }
    .page-btn {
      padding: 8px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      cursor: pointer;
      font-size: 14px;
      transition: background .15s;
    }
    .page-btn:hover { background: var(--surface2); }
    .page-btn:disabled { opacity: .3; cursor: default; }
    .page-btn.active { background: var(--accent); border-color: var(--accent); }

    .empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }
    .empty .icon { font-size: 48px; margin-bottom: 12px; }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.7);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px;
      width: 500px;
      max-width: 95vw;
    }
    .modal h2 { margin-bottom: 16px; font-size: 1.1rem; }
    .modal textarea {
      width: 100%;
      height: 180px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 10px 14px;
      font-size: 13px;
      resize: vertical;
      outline: none;
    }
    .modal textarea:focus { border-color: var(--accent); }
    .modal-actions { display: flex; gap: 10px; margin-top: 14px; justify-content: flex-end; }
    .btn-secondary {
      padding: 8px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      cursor: pointer;
      font-size: 14px;
    }

    .toast {
      position: fixed;
      bottom: 24px; right: 24px;
      background: var(--accent);
      color: #fff;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      opacity: 0;
      transform: translateY(10px);
      transition: all .3s;
      pointer-events: none;
      z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>

<header>
  <h1>🔍 Bunkr Search</h1>
  <div class="search-wrap">
    <input id="q" type="search" placeholder="Album suchen…" autocomplete="off">
    <select id="sort" onchange="reload()">
      <option value="newest">Neueste</option>
      <option value="most_files">Meiste Dateien</option>
      <option value="az">A–Z</option>
      <option value="oldest">Älteste</option>
    </select>
  </div>
  <button class="add-btn" onclick="openModal()">+ URLs hinzufügen</button>
</header>

<main>
  <div class="stats-bar" id="statsBar">Lädt…</div>
  <div class="meta-bar">
    <span id="resultInfo"></span>
    <select id="perPage" onchange="reload()">
      <option value="20">20 / Seite</option>
      <option value="50">50 / Seite</option>
      <option value="100">100 / Seite</option>
    </select>
  </div>
  <div class="grid" id="grid"></div>
  <div class="pagination" id="pagination"></div>
</main>

<!-- Add URLs Modal -->
<div class="modal-overlay" id="modal" onclick="closeModalOutside(event)">
  <div class="modal">
    <h2>📥 Bunkr-URLs hinzufügen</h2>
    <p style="font-size:13px;color:var(--muted);margin-bottom:12px;">
      Eine URL pro Zeile. Die Alben werden im Hintergrund gescraped.
    </p>
    <textarea id="urlInput" placeholder="https://bunkr.si/a/abc123&#10;https://bunkr.si/a/xyz456"></textarea>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Abbrechen</button>
      <button class="add-btn" onclick="submitUrls()">Hinzufügen</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── Config ───────────────────────────────────────────────────────────────
  const API = ""; // leer = selber Server; z.B. "http://localhost:8000" für lokale Dev

  // ── State ────────────────────────────────────────────────────────────────
  let offset = 0;
  let total  = 0;
  let debounceTimer;

  // ── Search ───────────────────────────────────────────────────────────────
  document.getElementById("q").addEventListener("input", () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => { offset = 0; reload(); }, 320);
  });

  async function reload() {
    const q      = document.getElementById("q").value.trim();
    const sort   = document.getElementById("sort").value;
    const limit  = +document.getElementById("perPage").value;

    const url = `${API}/api/search?q=${encodeURIComponent(q)}&sort=${sort}&limit=${limit}&offset=${offset}`;
    const res  = await fetch(url);
    if (!res.ok) return;
    const data = await res.json();
    total = data.total;

    renderGrid(data.results);
    renderMeta(data.total, limit);
    renderPagination(limit);
  }

  function renderGrid(albums) {
    const grid = document.getElementById("grid");
    if (!albums.length) {
      grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
        <div class="icon">🗃️</div>
        <div>Keine Alben gefunden</div>
      </div>`;
      return;
    }
    grid.innerHTML = albums.map(a => `
      <a class="card" href="${a.url}" target="_blank" rel="noopener">
        ${a.thumbnail
          ? `<img class="card-thumb" src="${a.thumbnail}" loading="lazy" onerror="this.replaceWith(placeholder())">`
          : `<div class="thumb-placeholder">📁</div>`
        }
        <div class="card-body">
          <div class="card-title">${escHtml(a.title)}</div>
          <div class="card-meta">
            <span>📄 ${a.file_count} Dateien</span>
            ${a.size ? `<span>💾 ${a.size}</span>` : ""}
          </div>
        </div>
      </a>
    `).join("");
  }

  function placeholder() {
    const el = document.createElement("div");
    el.className = "thumb-placeholder";
    el.textContent = "📁";
    return el;
  }

  function renderMeta(total, limit) {
    const from = offset + 1;
    const to   = Math.min(offset + limit, total);
    document.getElementById("resultInfo").textContent =
      total ? `${from}–${to} von ${total} Alben` : "Keine Ergebnisse";
  }

  function renderPagination(limit) {
    const pages = Math.ceil(total / limit);
    const cur   = Math.floor(offset / limit);
    const pag   = document.getElementById("pagination");
    if (pages <= 1) { pag.innerHTML = ""; return; }

    let html = `<button class="page-btn" onclick="goPage(${cur-1},${limit})" ${cur===0?"disabled":""}>← Zurück</button>`;

    const range = pageRange(cur, pages);
    range.forEach(p => {
      if (p === "…") {
        html += `<span style="padding:8px 4px;color:var(--muted)">…</span>`;
      } else {
        html += `<button class="page-btn ${p===cur?"active":""}" onclick="goPage(${p},${limit})">${p+1}</button>`;
      }
    });

    html += `<button class="page-btn" onclick="goPage(${cur+1},${limit})" ${cur>=pages-1?"disabled":""}>Weiter →</button>`;
    pag.innerHTML = html;
  }

  function pageRange(cur, pages) {
    const delta = 2;
    const range = [];
    for (let i = Math.max(0, cur-delta); i <= Math.min(pages-1, cur+delta); i++) range.push(i);
    if (range[0] > 0)        range.unshift("…", 0);
    if (range.at(-1) < pages-1) range.push("…", pages-1);
    return range;
  }

  function goPage(p, limit) {
    offset = p * limit;
    reload();
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  // ── Stats ────────────────────────────────────────────────────────────────
  async function loadStats() {
    try {
      const res  = await fetch(`${API}/api/stats`);
      const data = await res.json();
      document.getElementById("statsBar").innerHTML =
        `<span>🗂️ <b>${data.total_albums.toLocaleString("de")}</b> Alben</span>` +
        `<span>📄 <b>${data.total_files.toLocaleString("de")}</b> Dateien</span>` +
        (data.latest ? `<span>🕐 Zuletzt hinzugefügt: <b>${escHtml(data.latest.title)}</b></span>` : "");
    } catch { }
  }

  // ── Modal ────────────────────────────────────────────────────────────────
  function openModal()  { document.getElementById("modal").classList.add("open"); }
  function closeModal() { document.getElementById("modal").classList.remove("open"); }
  function closeModalOutside(e) { if (e.target.id === "modal") closeModal(); }

  async function submitUrls() {
    const raw  = document.getElementById("urlInput").value;
    const urls = raw.split("\n").map(s => s.trim()).filter(s => s.startsWith("http"));
    if (!urls.length) return;
    await fetch(`${API}/api/albums/bulk`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ urls }),
    });
    closeModal();
    document.getElementById("urlInput").value = "";
    showToast(`✓ ${urls.length} URLs werden gescraped…`);
    setTimeout(() => { loadStats(); reload(); }, 3000);
  }

  // ── Toast ────────────────────────────────────────────────────────────────
  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 3500);
  }

  // ── Utils ────────────────────────────────────────────────────────────────
  function escHtml(str) {
    return (str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  // ── Init ─────────────────────────────────────────────────────────────────
  loadStats();
  reload();
</script>
</body>
</html>
